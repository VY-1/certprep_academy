name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  frontend-tests:
    name: Frontend Tests (Vitest + Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js and pnpm
        uses: pnpm/action-setup@v2
        with:
          node-version: '18'

      - name: Install dependencies
        run: pnpm install

      - name: Build frontend
        run: pnpm --dir src/frontend run build

      - name: Run unit tests (Vitest)
        run: pnpm --dir src/frontend exec vitest run --reporter=dot

      - name: Install Playwright browsers
        run: pnpm --dir src/frontend exec npx playwright install --with-deps

      - name: Run Playwright E2E
        run: pnpm --dir src/frontend exec npx playwright test --reporter=github
